version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - javascript
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - rust
