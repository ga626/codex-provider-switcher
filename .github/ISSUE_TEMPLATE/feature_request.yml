name: 功能建议
description: 建议如何改进 CodeX Provider Switcher
title: "[建议]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 想解决什么
      description: 哪个使用流程应该更简单或更安全？
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 现在如何处理
      description: 目前的替代做法是什么？
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: 涉及范围
      options:
        - Provider 切换
        - 模型目录
        - 备份与恢复
        - 本地 Web 控制台
        - 启动器与更新流程
        - 旧工具替换
        - 界面与信息结构
        - 文档
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: 安全影响
      description: 是否会涉及 config.toml、auth.json、API key、备份或旧工具迁移？
    validations:
      required: false
