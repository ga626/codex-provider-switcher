name: 问题反馈
description: 报告 Signalman AI 的使用问题
title: "[问题]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请不要填写真实 API key、auth.json、完整 config.toml、含凭据的截图或私有服务商账户资料。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 最小复现步骤
      description: 写出能稳定复现问题的最少步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 使用环境
      description: Windows 版本、应用版本、Codex 使用入口、服务商名称。请脱敏。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可选。请先移除 key、token、本机认证文件和服务商账户信息。
    validations:
      required: false
