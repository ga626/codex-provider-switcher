name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to verify or publish"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release identity
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      artifact_name: ${{ steps.identity.outputs.artifact_name }}
      release_state: ${{ steps.release_state.outputs.release_state }}
      version: ${{ steps.identity.outputs.version }}
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate tag and version metadata
        id: identity
        shell: pwsh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($version) -or $env:RELEASE_TAG -notmatch '^v') {
            throw "Release tag must start with v. Received: $env:RELEASE_TAG"
          }
          $package = Get-Content -Raw -LiteralPath 'package.json' | ConvertFrom-Json
          $tauri = Get-Content -Raw -LiteralPath 'src-tauri/tauri.conf.json' | ConvertFrom-Json
          $cargoText = Get-Content -Raw -LiteralPath 'src-tauri/Cargo.toml'
          if ($package.version -ne $version) { throw "package.json version does not match tag: $($package.version) != $version" }
          if ($tauri.version -ne $version) { throw "tauri.conf.json version does not match tag: $($tauri.version) != $version" }
          if ($cargoText -notmatch ('(?m)^version\s*=\s*"' + [regex]::Escape($version) + '"')) { throw "Cargo version does not match tag: $version" }
          $head = (& git rev-parse HEAD).Trim()
          $tagCommit = (& git rev-list -n 1 $env:RELEASE_TAG).Trim()
          if ($head -ne $tagCommit) { throw "Checkout does not match release tag. HEAD=$head Tag=$tagCommit" }
          $shortSha = (& git rev-parse --short=7 HEAD).Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=release-assets-$env:RELEASE_TAG-$shortSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Refuse incomplete existing Release assets
        id: release_state
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          $releaseName = "CodeXProviderSwitcher-windows-x64-$version"
          $expectedNames = @(
            "$releaseName.zip",
            "$releaseName.zip.sha256",
            "$releaseName-setup.exe",
            "$releaseName-setup.exe.sha256",
            "$releaseName-setup.exe.sig",
            "latest.json"
          )
          $releaseRaw = & gh api "repos/ga626/codex-provider-switcher/releases/tags/$env:RELEASE_TAG" 2>&1
          if ($LASTEXITCODE -ne 0) {
            if ($releaseRaw -match "404|Not Found") {
              "release_state=missing" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              exit 0
            }
            throw "Unable to determine GitHub Release state. Output: $releaseRaw"
          }
          $release = $releaseRaw | ConvertFrom-Json
          if ($release.draft -or $release.prerelease) {
            throw "Existing GitHub Release $env:RELEASE_TAG is not eligible for the updater latest channel."
          }
          $assetNames = @($release.assets | ForEach-Object { $_.name })
          $missingNames = @($expectedNames | Where-Object { $_ -notin $assetNames })
          if ($missingNames.Count -gt 0) {
            throw "Existing GitHub Release is incomplete. Refusing to overwrite assets: $($missingNames -join '; ')"
          }
          "release_state=complete" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build:
    name: Build signed Windows assets
    needs: preflight
    if: needs.preflight.outputs.release_state == 'missing'
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust and Tauri build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Validate signing Secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) { throw 'TAURI_SIGNING_PRIVATE_KEY secret is missing.' }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) { throw 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is missing.' }

      - name: Build signed release assets with phase timing
        shell: pwsh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          npm run release:build -- -Version $version -Apply

      - name: Verify local release assets
        shell: pwsh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\verify-release-upload-assets.ps1 -Version $version
          npm run release:verify-local

      - name: Upload verified release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.preflight.outputs.artifact_name }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified GitHub Release
    needs:
      - preflight
      - build
    if: needs.preflight.outputs.release_state == 'missing'
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download verified release assets
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.preflight.outputs.artifact_name }}
          path: release-assets

      - name: Publish or verify GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\publish-github-release-from-artifact.ps1 -Version $env:RELEASE_VERSION -Tag $env:RELEASE_TAG

  verify_existing:
    name: Verify existing immutable Release
    needs: preflight
    if: needs.preflight.outputs.release_state == 'complete'
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify existing Release structure
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\verify-github-release-asset.ps1 -Version $env:RELEASE_VERSION -Tag $env:RELEASE_TAG -RemoteStructureOnly
