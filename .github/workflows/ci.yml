name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository hygiene doctor
        run: npm run verify:doctor

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Verify Microsoft Store manifest and version mapping
        run: npm run store:verify-package

      - name: Smoke runtime boundary
        run: npm run runtime-boundary:smoke

      - name: Smoke Tauri desktop boundary
        run: npm run tauri:desktop-boundary:smoke

      - name: Verify GitHub and Store release channel boundary
        run: npm run release:channel-smoke

      - name: Verify release readiness permission boundary
        run: npm run release:readiness:smoke

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust and Tauri build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build local web backend
        run: npm run backend:build

      - name: Smoke local web backend
        run: npm run backend:smoke

      - name: Exercise protected credentials and recovery backup
        run: npm run backend:functional-smoke

      - name: Build release package
        run: npm run release:build -- -Apply -SkipDesktopBundle

      - name: Verify release package
        run: npm run release:verify-local

      - name: Diff whitespace check
        shell: pwsh
        run: git diff --check

      - name: Stable install QA boundary
        run: npm run qa:stable-install -- -ExplainOnly
