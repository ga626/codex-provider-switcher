name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository hygiene doctor
        run: npm run verify:doctor

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build local web backend
        run: npm run backend:build

      - name: Smoke local web backend
        run: npm run backend:smoke

      - name: Build release package
        run: npm run release:build -- -Apply

      - name: Verify release package
        run: npm run release:verify-local

      - name: Diff whitespace check
        shell: pwsh
        run: git diff --check
